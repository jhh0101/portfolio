spring:
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    url: ${ORACLE_URL}
    username: ${ORACLE_USERNAME}
    password: ${ORACLE_PASSWORD}

  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD:1234}

cloud:
  aws:
    s3:
      bucket: my-auction-bucket
    region:
      static: ap-northeast-2

jwt:
  secret: ${JWT_SECRET_KEY}
