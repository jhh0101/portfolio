apiVersion: v1
kind: Service
metadata:
  name: redis             # application.yml의 host: redis와 매칭
spec:
  selector:
    app: redis-app        # deployment.yml의 label과 매칭
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379

---

apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend-app
  ports:
    - port: 8888
      targetPort: 8888
